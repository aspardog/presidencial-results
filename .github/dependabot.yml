# Configuracion de Dependabot para alertas de seguridad
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Python (para scripts de visualizacion)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # GitHub Actions (si se agregan en el futuro)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
